<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Simple Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* ═══ Light Mode (Default) ═══ */
        :root {
            --bg-primary: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0,0,0,0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.2);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --orb-opacity: 0.12;
            --input-bg: rgba(0,0,0,0.03);
            --input-border: rgba(0,0,0,0.1);
            --shadow: 0 25px 50px rgba(0,0,0,0.1);
        }
        /* ═══ Dark Mode ═══ */
        [data-theme="dark"] {
            --bg-primary: #0a0e17;
            --glass: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255,255,255,0.08);
            --accent-glow: rgba(99,102,241,0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --orb-opacity: 0.25;
            --input-bg: rgba(255,255,255,0.04);
            --input-border: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .bg-orb {
            position: fixed; border-radius: 50%; filter: blur(80px);
            opacity: var(--orb-opacity); animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }
        .bg-orb:nth-child(1) { width:400px;height:400px;background:#6366f1;top:-100px;left:-100px; }
        .bg-orb:nth-child(2) { width:350px;height:350px;background:#8b5cf6;bottom:-80px;right:-80px;animation-delay:-7s; }
        .bg-orb:nth-child(3) { width:250px;height:250px;background:#06b6d4;top:50%;left:50%;animation-delay:-14s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.02); }
        }

        .login-container {
            position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 0 20px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 48px 40px;
            box-shadow: var(--shadow);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo .icon {
            width:64px;height:64px;background:linear-gradient(135deg,var(--accent),#8b5cf6);
            border-radius:18px;display:inline-flex;align-items:center;justify-content:center;
            font-size:28px;color:white;margin-bottom:16px;box-shadow:0 8px 24px var(--accent-glow);
        }
        .login-logo h1 { font-size:1.5rem;font-weight:600;color:var(--text-primary);letter-spacing:-0.02em; }
        .login-logo p { color:var(--text-secondary);font-size:0.875rem;margin-top:4px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display:block;font-size:0.8rem;font-weight:500;color:var(--text-secondary);
            margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position:absolute;left:14px;top:50%;transform:translateY(-50%);
            color:var(--text-secondary);font-size:16px;transition:color 0.3s;
        }
        .form-group input {
            width:100%;padding:14px 16px 14px 44px;
            background:var(--input-bg);border:1px solid var(--input-border);
            border-radius:12px;color:var(--text-primary);font-size:0.95rem;font-family:inherit;
            transition:all 0.3s ease;outline:none;
        }
        .form-group input:focus { border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--input-bg); }
        .form-group input::placeholder { color:var(--text-secondary);opacity:0.5; }

        .login-btn {
            width:100%;padding:14px;
            background:linear-gradient(135deg,var(--accent),#8b5cf6);
            color:white;border:none;border-radius:12px;font-size:1rem;font-weight:600;
            font-family:inherit;cursor:pointer;transition:all 0.3s ease;
            position:relative;overflow:hidden;margin-top:8px;
        }
        .login-btn:hover { transform:translateY(-2px);box-shadow:0 12px 24px var(--accent-glow); }
        .login-btn:active { transform:translateY(0); }

        .error-msg {
            background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
            color:#ef4444;padding:12px 16px;border-radius:10px;font-size:0.85rem;
            margin-bottom:20px;display:flex;align-items:center;gap:8px;
            animation:shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }
        @keyframes shake {
            10%,90%{transform:translateX(-1px);} 20%,80%{transform:translateX(2px);}
            30%,50%,70%{transform:translateX(-3px);} 40%,60%{transform:translateX(3px);}
        }

        .theme-btn {
            position:fixed;top:20px;right:20px;z-index:100;
            width:40px;height:40px;border-radius:12px;border:1px solid var(--glass-border);
            background:var(--glass);backdrop-filter:blur(20px);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;font-size:16px;color:var(--text-secondary);
            transition:all 0.3s ease;
        }
        .theme-btn:hover { color:var(--text-primary);transform:scale(1.1); }
    </style>
    <script>
        // Apply saved theme before paint
        (function(){ const t=localStorage.getItem('theme')||'light'; if(t==='dark') document.documentElement.setAttribute('data-theme','dark'); })();
    </script>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <i class="bi bi-circle-half"></i>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon"><i class="bi bi-cloud-fill"></i></div>
                <h1>Simple Drive</h1>
                <p>Sign in to your storage</p>
            </div>

            {% if error %}
            <div class="error-msg">
                <i class="bi bi-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" placeholder="Enter your username" required autofocus>
                        <i class="bi bi-person"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" placeholder="Enter your password" required>
                        <i class="bi bi-lock"></i>
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    <i class="bi bi-box-arrow-in-right"></i>&nbsp; Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        function toggleTheme(){
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
    </script>
</body>
</html>
